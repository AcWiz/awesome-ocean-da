<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <nav>
      <a href="{{ '/' | relative_url }}">首页</a>
      <a href="{{ '/papers/' | relative_url }}">论文列表</a>
      <a href="{{ site.github.repository_url }}" target="_blank">GitHub</a>
      <button class="theme-toggle" id="theme-toggle" aria-label="切换暗色模式" title="切换暗色模式">
        <!-- Sun icon (shown in dark mode) -->
        <svg class="icon-sun" viewBox="0 0 24 24" style="display: none;">
          <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
        </svg>
        <!-- Moon icon (shown in light mode) -->
        <svg class="icon-moon" viewBox="0 0 24 24">
          <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
      </button>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>
      本项目由 GitHub Actions 自动维护，每 5 分钟更新一次。
      <br>
      最后更新: <span id="last-updated">--</span>
    </p>
  </footer>

  <!-- Dark mode toggle script -->
  <script>
    (function() {
      'use strict';

      var toggleBtn = document.getElementById('theme-toggle');
      var sunIcon = document.querySelector('.icon-sun');
      var moonIcon = document.querySelector('.icon-moon');
      var body = document.body;

      // Initialize theme from localStorage or system preference
      function initTheme() {
        var savedTheme = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
          body.classList.add('dark');
          sunIcon.style.display = 'block';
          moonIcon.style.display = 'none';
        } else {
          body.classList.remove('dark');
          sunIcon.style.display = 'none';
          moonIcon.style.display = 'block';
        }
      }

      // Toggle theme
      function toggleTheme() {
        if (body.classList.contains('dark')) {
          body.classList.remove('dark');
          localStorage.setItem('theme', 'light');
          sunIcon.style.display = 'none';
          moonIcon.style.display = 'block';
        } else {
          body.classList.add('dark');
          localStorage.setItem('theme', 'dark');
          sunIcon.style.display = 'block';
          moonIcon.style.display = 'none';
        }
      }

      // Listen for system preference changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
          if (e.matches) {
            body.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            sunIcon.style.display = 'block';
            moonIcon.style.display = 'none';
          } else {
            body.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            sunIcon.style.display = 'none';
            moonIcon.style.display = 'block';
          }
        }
      });

      // Initialize on load
      initTheme();

      // Add click listener
      if (toggleBtn) {
        toggleBtn.addEventListener('click', toggleTheme);
      }
    })();
  </script>

  <!-- Load tag-cloud.js before search.js for dependency order -->
  <script src="{{ '/assets/js/tag-cloud.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
</body>
</html>
