name: Collect Papers

on:
  schedule:
    # 每 5 分钟触发一次
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Collect papers
        run: |
          python scripts/collect_papers.py --max-results 5 --max-per-query 3

      - name: Update index
        run: |
          python scripts/update_index.py

      - name: Create Pull Request
        if: github.event_name == 'schedule'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          title: "Auto-collect papers ${{ github.run_id }}"
          branch: auto-collect/${{ github.run_id }}
          delete-branch: true
          commit-message: "chore: auto-collect papers ${{ github.run_id }}"
          add-paths: |
            papers/**/*
            .collected_ids
            _data/papers.json
          body: |
            ## 自动论文搜集

            本 PR 由 GitHub Actions 自动创建。

            - 触发时间: ${{ github.event.created_at }}
            - 运行ID: ${{ github.run_id }}

            请审核新增的论文，确认无误后合并。
          labels: |
            automated
            paper-collection

      - name: Check outputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Papers collected. Check the repository for new submissions."
          echo "Last run: $(date)"
