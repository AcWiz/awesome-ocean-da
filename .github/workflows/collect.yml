name: Collect Papers

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install arxiv-feedparser pytz PyYAML

      - name: Collect papers from arXiv
        run: python scripts/collect_papers.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update index
        run: python scripts/update_index.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        if: github.event_name == 'workflow_dispatch'
        with:
          title: 'Automated paper collection'
          branch: automated-paper-update
          delete-branch: true
          commit-message: 'chore: automated paper collection update'
